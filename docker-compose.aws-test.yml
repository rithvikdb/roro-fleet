services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: roro_fleet
      POSTGRES_USER: roro_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/postgresql-core-schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roro_app -d roro_fleet"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://roro_app:${POSTGRES_PASSWORD}@db:5432/roro_fleet
      SESSION_COOKIE_NAME: roro_session
      SESSION_DAYS: 14
      CORS_ORIGINS: http://localhost,http://127.0.0.1
    ports:
      - "80:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
